version: "3.8"

services:
  # Nginx 리버스 프록시 & 로드밸런서
  nginx:
    image: nginx:alpine
    container_name: writerly-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - writerly-network

  # Flask 웹 애플리케이션 (멀티 인스턴스)
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: writerly-web
    deploy:
      replicas: 3 # 로드밸런싱을 위한 3개 인스턴스
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://writerly:${POSTGRES_PASSWORD}@postgres:5432/writerly
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - SSL_CERT_FILE=/app/ssl/cert.pem
      - SSL_KEY_FILE=/app/ssl/key.pem
    volumes:
      - ./ssl:/app/ssl:ro
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - writerly-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Celery Worker (멀티 워커)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: writerly-worker
    deploy:
      replicas: 2 # 2개의 워커 인스턴스
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    environment:
      - DATABASE_URL=postgresql://writerly:${POSTGRES_PASSWORD}@postgres:5432/writerly
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - writerly-network
    command: celery -A tasks.ai_tasks.app worker --loglevel=info --pool=eventlet --concurrency=4
    healthcheck:
      test: ["CMD-SHELL", "celery -A tasks.ai_tasks.app inspect ping || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s

  # Celery Beat (스케줄러)
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: writerly-beat
    environment:
      - DATABASE_URL=postgresql://writerly:${POSTGRES_PASSWORD}@postgres:5432/writerly
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - writerly-network
    command: celery -A tasks.ai_tasks.app beat --loglevel=info

  # PostgreSQL 데이터베이스
  postgres:
    image: postgres:15-alpine
    container_name: writerly-postgres
    environment:
      - POSTGRES_DB=writerly
      - POSTGRES_USER=writerly
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --locale=C
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    networks:
      - writerly-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U writerly -d writerly"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis (메시지 브로커 & 캐시)
  redis:
    image: redis:7-alpine
    container_name: writerly-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/etc/redis/redis.conf:ro
    restart: unless-stopped
    networks:
      - writerly-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

  # Prometheus (메트릭 수집)
  prometheus:
    image: prom/prometheus:latest
    container_name: writerly-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
    restart: unless-stopped
    networks:
      - writerly-network

  # Grafana (메트릭 시각화)
  grafana:
    image: grafana/grafana:latest
    container_name: writerly-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_INSTALL_PLUGINS=redis-datasource
    restart: unless-stopped
    networks:
      - writerly-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  writerly-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
