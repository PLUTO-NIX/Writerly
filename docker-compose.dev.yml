version: "3.8"

services:
  # Redis (메시지 브로커)
  redis:
    image: redis:7-alpine
    container_name: writerly-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # PostgreSQL 데이터베이스 (개발용)
  postgres:
    image: postgres:15-alpine
    container_name: writerly-postgres
    environment:
      - POSTGRES_DB=writerly
      - POSTGRES_USER=writerly
      - POSTGRES_PASSWORD=writerly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U writerly"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
  postgres_data:
